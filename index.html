<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <title>Ear Training: тренажер музичного слуху</title>
    <style>
      :root {
        color: #f8fbff;
        background: #030512;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at 50% 24%, rgba(34, 211, 238, 0.16), transparent 30%),
          radial-gradient(circle at 22% 74%, rgba(168, 85, 247, 0.18), transparent 34%),
          linear-gradient(135deg, #030512 0%, #0b1024 52%, #020817 100%);
      }

      .app-loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        min-height: 100dvh;
        padding: 24px;
        color: #f8fbff;
        text-align: center;
        overflow: hidden;
      }

      .app-loading-card {
        display: grid;
        justify-items: center;
        gap: 16px;
        width: min(440px, 100%);
        padding: 34px 28px;
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.62);
        border: 1px solid rgba(125, 211, 252, 0.22);
        box-shadow: 0 30px 100px rgba(0, 0, 0, 0.42), 0 0 72px rgba(34, 211, 238, 0.12);
        backdrop-filter: blur(20px);
      }

      .app-loading-logo {
        display: grid;
        place-items: center;
        width: 76px;
        height: 76px;
        border-radius: 26px;
        color: #e0f2fe;
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.76), rgba(14, 165, 233, 0.58));
        border: 1px solid rgba(191, 219, 254, 0.32);
        box-shadow: 0 0 70px rgba(34, 211, 238, 0.24);
      }

      .app-loading-card h1,
      .app-loading-card p {
        margin: 0;
      }

      .app-loading-card h1 {
        font-size: clamp(2rem, 7vw, 3.6rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .app-loading-card p {
        color: #dbeafe;
        line-height: 1.55;
      }

      .app-loading-wave {
        display: flex;
        align-items: end;
        gap: 7px;
        height: 48px;
        margin-top: 4px;
      }

      .app-loading-wave span {
        width: 7px;
        border-radius: 999px;
        background: linear-gradient(180deg, #67e8f9, #a78bfa);
        box-shadow: 0 0 22px rgba(34, 211, 238, 0.3);
        animation: loadingWave 1.05s ease-in-out infinite alternate;
      }

      .app-loading-wave span:nth-child(1) { height: 22px; }
      .app-loading-wave span:nth-child(2) { height: 38px; animation-delay: 0.12s; }
      .app-loading-wave span:nth-child(3) { height: 48px; animation-delay: 0.24s; }
      .app-loading-wave span:nth-child(4) { height: 32px; animation-delay: 0.36s; }

      @keyframes loadingWave {
        from { transform: scaleY(0.62); opacity: 0.62; }
        to { transform: scaleY(1.08); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading-screen" aria-label="Loading">
        <div class="app-loading-card">
          <div class="app-loading-logo" aria-hidden="true">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 18V5l10-2v13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="6.5" cy="18" r="3" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="16.5" cy="16" r="3" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </div>
          <h1>Ear Training</h1>
          <div class="app-loading-wave" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
          <p>Loading your listening journey…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
